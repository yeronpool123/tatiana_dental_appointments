{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <div class="card glass p-4">
    <h2 class="mb-3 text-primary"><i class="fa-solid fa-notes-medical"></i> Registrar Historia Clínica</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100">
        <i class="fa-solid fa-save"></i> Guardar
      </button>
    </form>
  </div>
</div>
{% endblock %}
