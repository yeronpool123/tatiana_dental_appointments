{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:70vh;">
  <div class="card glass p-4 text-center" style="max-width:500px; width:100%;">
    <h3 class="text-primary mb-3"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</h3>
    <p class="text-muted mb-4">¿Seguro que deseas cerrar tu sesión?</p>

    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger w-100 mb-2">
        <i class="fa-solid fa-power-off"></i> Sí, cerrar sesión
      </button>
    </form>

    <a href="/" class="btn btn-outline-primary w-100">
      <i class="fa-solid fa-house"></i> Volver al inicio
    </a>
  </div>
</div>

<style>
.glass {
  background: rgba(255,255,255,0.28);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  transition: transform .18s ease, box-shadow .18s ease;
}
.glass:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(0,0,0,0.15);
}
</style>
{% endblock %}
