{% load i18n %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Recuperar contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #e0f7fa, #ffffff);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      border-radius: 1rem;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .form-control {
      border-radius: 0.5rem;
    }
    .btn-custom {
      background: linear-gradient(90deg, #007bff, #00c6ff);
      border: none;
      color: #fff;
      font-weight: 600;
      transition: transform 0.2s ease;
    }
    .btn-custom:hover {
      transform: scale(1.02);
      background: linear-gradient(90deg, #0069d9, #00a6e0);
    }
    .header-icon {
      font-size: 3rem;
      color: #007bff;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg p-4">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock header-icon"></i>
          <h3 class="mt-2">Recuperar contraseña</h3>
          <p class="text-muted">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
        </div>
        <form method="post" action="{% url 'account_reset_password' %}">
          {% csrf_token %}
          <div class="mb-3">
            {{ form.email.label_tag }}
            {{ form.email }}
          </div>
          <button type="submit" class="btn btn-custom w-100">Enviar enlace de recuperación</button>
        </form>
        <div class="text-center mt-3">
          <a href="{% url 'account_login' %}" class="text-decoration-none">Volver al inicio de sesión</a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</body>
</html>
