{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🦷 Iniciar Sesión - Clínica Dental</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Iconos -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #cce5ff, #e6f2ff);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(14px);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      margin: 3rem auto;
    }

    .form-floating > label {
      color: #0072ff;
      font-weight: 500;
    }

    .form-control {
      border-radius: 12px;
      border: 1px solid #cce5ff;
      background-color: rgba(255, 255, 255, 0.8);
    }

    .btn-gradient {
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.75rem;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    .btn-gradient:hover {
      transform: scale(1.03);
      box-shadow: 0 0 10px rgba(0, 114, 255, 0.4);
    }

    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #0072ff;
    }
  </style>
</head>
<body>

  <!-- 🔐 Login Card -->
  <div class="glass-card">
    <h2 class="text-center mb-4">
      <i class="fa-solid fa-right-to-bracket me-2"></i>Iniciar Sesión
    </h2>

    {% if form.errors %}
      <div class="alert alert-danger">
        <strong>Error:</strong> Verifica tus credenciales.
      </div>
    {% endif %}

    <!-- Formulario corregido -->
    <form method="post" action="{% url 'account_login' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div class="form-floating mb-3">
        <input type="text" name="login" id="login" class="form-control" placeholder="Usuario o correo" required>
        <label for="login">Usuario o correo</label>
      </div>

      <!-- Contraseña con toggle -->
      <div class="form-floating mb-3 position-relative">
        <input type="password" name="password" id="password" class="form-control" placeholder="Contraseña" required>
        <label for="password">Contraseña</label>
        <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="remember" id="remember">
        <label class="form-check-label" for="remember">Recordarme</label>
      </div>

      <button type="submit" class="btn btn-gradient w-100">
        <i class="fa-solid fa-sign-in-alt me-2"></i>Entrar
      </button>
    </form>

    <p class="mt-3 text-center">
      <a href="{% url 'account_reset_password' %}" class="text-link">¿Olvidaste tu contraseña?</a>
    </p>

    <p class="mt-2 text-center">
      ¿No tienes cuenta?
      <a href="{% url 'account_signup' %}" class="text-link">Regístrate aquí</a>
    </p>
  </div>

  <!-- JS toggle contraseña -->
  <script>
    function togglePassword(fieldId, icon) {
      const field = document.getElementById(fieldId);
      if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        field.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
