{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🔐 Login Facial - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap y FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      background: linear-gradient(135deg, #cce5ff, #e6f2ff); /* Celeste claro y blanco */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .glass-card {
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(14px);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      text-align: center;
      width: 420px;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .glass-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    video, canvas {
      border-radius: 16px;
      margin-bottom: 1rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .btn-fancy {
      background: linear-gradient(135deg, #0072ff, #00c6ff); /* Azul y celeste */
      border: none;
      color: white;
      font-weight: 600;
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
      transition: all .25s ease;
    }
    .btn-fancy:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .icon-big {
      font-size: 3rem;
      color: #0072ff;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <i class="fa-solid fa-face-smile icon-big"></i>
    <h3 class="mb-3">Hola Admin 👋</h3>
    <p class="text-muted mb-4">¿Desea iniciar sesión por reconocimiento facial?</p>

    <video id="video" width="320" height="240" autoplay></video>
    <canvas id="canvas" width="320" height="240" hidden></canvas>

    <form id="faceForm" method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <input type="file" id="face_image" name="face_image" hidden>
      <button type="button" id="snap" class="btn-fancy w-100 mt-3">
        <i class="fa-solid fa-camera me-2"></i> Iniciar sesión con Face ID
      </button>
    </form>

    {% if error %}
      <p class="text-danger mt-3">{{ error }}</p>
    {% endif %}
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');
    const context = canvas.getContext('2d');

    // Acceder a la cámara
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => { video.srcObject = stream; });

    snap.addEventListener("click", () => {
      context.drawImage(video, 0, 0, 320, 240);
      canvas.toBlob(blob => {
        const fileInput = document.getElementById("face_image");
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(new File([blob], "capture.jpg"));
        fileInput.files = dataTransfer.files;
        document.getElementById("faceForm").submit();
      });

      // Mensaje de bienvenida con duración más larga
      Swal.fire({
        title: '🔐 Bienvenido de nuevo!',
        text: 'Tu rostro ha sido reconocido correctamente.',
        icon: 'success',
        confirmButtonText: 'Entrar al panel',
        confirmButtonColor: '#0072ff',
        timer: 3000, // dura 3 segundos
        timerProgressBar: true
      });
    });
  </script>
</body>
</html>
