{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar perfil</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Iconos -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #cce5ff, #e6f2ff);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    .glass {
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .glass:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.15);
    }
    .icon-input {
      position: relative;
    }
    .icon-input svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      fill: #0072ff;
    }
    .icon-input input, .icon-input textarea {
      padding-left: 40px;
    }
    .btn-fancy {
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 12px;
      padding: 0.75rem;
      transition: all .25s ease;
    }
    .btn-fancy:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body class="py-4">
  <div class="container">
    <a href="{% url 'patient_dashboard' %}" class="btn btn-link mb-3">&larr; Volver</a>
    <div class="card glass p-4">
      <h4 class="mb-3 text-primary"><i class="fa-solid fa-user-gear"></i> Editar perfil</h4>
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          <!-- Nombre -->
          <div class="col-md-6 icon-input">
            <label class="form-label">Nombre</label>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
            <input name="first_name" class="form-control" value="{{ user.first_name }}">
          </div>

          <!-- Apellido -->
          <div class="col-md-6 icon-input">
            <label class="form-label">Apellido</label>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
            <input name="last_name" class="form-control" value="{{ user.last_name }}">
          </div>

          <!-- Dirección -->
          <div class="col-md-12 icon-input">
            <label class="form-label">Dirección</label>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5c-1.4 0-2.5-1.1-2.5-2.5S10.6 6.5 12 6.5s2.5 1.1 2.5 2.5S13.4 11.5 12 11.5z"/></svg>
            <input name="address" class="form-control" value="{{ profile.address }}">
          </div>

          <!-- Teléfono -->
          <div class="col-md-6 icon-input">
            <label class="form-label">Teléfono</label>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.27c1.2.48 2.53.74 3.91.74a1 1 0 011 1v3.5a1 1 0 01-1 1C10.07 22 2 13.93 2 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.38.26 2.71.74 3.91a1 1 0 01-.27 1.11l-2.35 2.77z"/></svg>
            <input name="phone" class="form-control" value="{{ profile.phone }}">
          </div>

          <!-- Fecha de nacimiento -->
          <div class="col-md-6 icon-input">
            <label class="form-label">Fecha de nacimiento</label>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 10h5v5H7z" opacity=".3"/><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v15c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 17H5V8h14v12z"/></svg>
            <input type="date" name="birth_date" class="form-control" value="{{ profile.birth_date }}">
          </div>

          <!-- Seguro médico -->
          <div class="col-md-6 icon-input">
            <label class="form-label">Seguro médico</label>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l8 4v6c0 5.25-3.75 10.74-8 12-4.25-1.26-8-6.75-8-12V6l8-4z"/></svg>
            <input name="insurance" class="form-control" value="{{ profile.insurance }}">
          </div>


          <div class="col-12 icon-input">
            <label class="form-label">Notas</label>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 4v16h18V4H3zm16 14H5V6h14v12z"/></svg>
            <textarea name="notes" class="form-control" rows="4">{{ profile.notes }}</textarea>
          </div>
        </div>
        <button class="btn btn-primary mt-3 w-100">
          <i class="fa-solid fa-save"></i> Guardar cambios
        </button>
      </form>
    </div>
  </div>
</body>
</html>
