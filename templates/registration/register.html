{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🦷 Crear Cuenta - Clínica Dental</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Iconos -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <style>
    body {
      background: linear-gradient(135deg, #cce5ff, #e6f2ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
    }

    .form-control {
      border-radius: 10px;
    }

    .btn-gradient {
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.75rem;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    .btn-gradient:hover {
      transform: scale(1.03);
      box-shadow: 0 0 10px rgba(0, 114, 255, 0.4);
    }

    .form-icon {
      color: #0072ff;
      margin-right: 8px;
    }

    .text-link {
      color: #0072ff;
      text-decoration: none;
    }

    .text-link:hover {
      text-decoration: underline;
    }

    .google-btn {
      background: white;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 0.6rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 1rem;
      transition: box-shadow 0.2s ease;
    }

    .google-btn:hover {
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>

  <div class="glass-card">
    <h2 class="text-center mb-4">
      <i class="fa-solid fa-user-plus form-icon"></i>Crear Cuenta
    </h2>

    {% if messages %}
      {% for m in messages %}
        <div class="alert alert-{{ m.tags }} alert-dismissible fade show" role="alert">
          {{ m }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}


      <!-- BLOQUE DE FORMULARIO DE REGISTRO DE USUARIO-->
       
      <div class="mb-3">
        <label for="first_name" class="form-label">Nombre</label>
        <input type="text" name="first_name" class="form-control" required placeholder="Tu nombre">
      </div>

      <div class="mb-3">
        <label for="last_name" class="form-label">Apellido</label>
        <input type="text" name="last_name" class="form-control" required placeholder="Tu apellido">
      </div>

      <div class="mb-3">
        <label for="address" class="form-label">Dirección</label>
        <input type="text" name="address" class="form-control" placeholder="Tu dirección">
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input type="email" name="email" class="form-control" required placeholder="ejemplo@correo.com">
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" required placeholder="••••••••">
      </div>

      <div class="mb-3">
        <label for="confirm" class="form-label">Confirmar contraseña</label>
        <input type="password" name="confirm" class="form-control" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn btn-gradient w-100 mt-3">
        <i class="fa-solid fa-user-check me-2"></i>Registrarse
      </button>
    </form>



    <p class="mt-4 text-center">
      ¿Ya tienes cuenta?
      <a href="{% url 'account_login' %}" class="text-link">Inicia sesión aquí</a>
    </p>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
